# =============================================================================
# ci.yml — Continuous integration for vim-semantic-ctags-diff
# =============================================================================
# WHAT:  Runs Python unit tests (semantic-ctags-diff submodule) and Vim
#        headless self-checks (test/*.vim) on every push and pull request.
# WHY:   Logic spans Python + Vimscript; CI catches regressions without manual
#        :SemanticCtagsDiff runs in a real project checkout.
# WHO:   GitHub Actions on push/PR to main; status badge in README.md.
# STRATEGY:
#   S01 — Checkout repository with the semantic-ctags-diff submodule.
#   S02 — Install git, universal-ctags, and vim (runtime deps).
#   S03 — pytest in submodules/semantic-ctags-diff (library unit tests).
#   S04 — Headless Vim scripts for cache + markdown navigation parsing.
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      # S01: Source tree must include the Python submodule at the pinned commit.
      - name: S01 — Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # S02: ctags for Python tests; git for diff_engine fixtures; vim for plugin checks.
      - name: S02 — Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y git universal-ctags vim

      # S03: Python semantic-branch-diff package — same suite as the submodule repo CI.
      - name: S03 — Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: submodules/semantic-ctags-diff/pyproject.toml

      - name: S03 — Install Python package and dev dependencies
        working-directory: submodules/semantic-ctags-diff
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: S03 — Run pytest
        working-directory: submodules/semantic-ctags-diff
        run: pytest -v

      # S04: Vim 8 headless self-checks — no Neovim, no GUI, exit 1 on assert failure.
      - name: S04 — Run Vim plugin self-checks
        run: |
          vim -N -u NONE -es -S test/nav_parse.vim
          vim -N -u NONE -es -S test/cache.vim
